<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="The AI Planit — globe concept">
  <defs>
    <linearGradient id="globe-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0033AA"/>
    </linearGradient>
  </defs>
  <!-- Globe with circuit/meridian lines -->
  <g transform="translate(40, 80)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#globe-grad)" stroke-width="4"/>
    <!-- Equator -->
    <ellipse cx="0" cy="0" rx="48" ry="14" fill="none" stroke="url(#globe-grad)" stroke-width="2"/>
    <!-- Meridian -->
    <ellipse cx="0" cy="0" rx="20" ry="48" fill="none" stroke="url(#globe-grad)" stroke-width="2"/>
    <!-- Circuit nodes -->
    <circle cx="0"   cy="-48" r="4" fill="#0066FF"/>
    <circle cx="0"   cy="48"  r="4" fill="#0066FF"/>
    <circle cx="-48" cy="0"   r="4" fill="#0066FF"/>
    <circle cx="48"  cy="0"   r="4" fill="#0066FF"/>
    <!-- Inner accent -->
    <circle cx="-12" cy="-8" r="6" fill="#0066FF" opacity="0.4"/>
    <circle cx="18"  cy="14" r="4" fill="#0066FF" opacity="0.4"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="120" y="78" font-size="40" font-weight="700" fill="#0A0A0A">The AI</text>
    <text x="120" y="120" font-size="44" font-weight="800" fill="#0066FF" letter-spacing="-1">Planit</text>
  </g>
</svg>
