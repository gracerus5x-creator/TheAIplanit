<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="The AI Planit">
  <defs>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4D94FF"/>
      <stop offset="60%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0033AA"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9CC9FF" stop-opacity="0.4"/>
