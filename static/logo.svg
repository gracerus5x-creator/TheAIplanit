             transform="rotate(-22 55 0)"/>
    <circle cx="55" cy="0" r="40" fill="url(#planet)"/>
    <ellipse cx="42" cy="-8" rx="16" ry="7" fill="#FFFFFF" opacity="0.25"/>
    <ellipse cx="65" cy="12" rx="10" ry="4" fill="#FFFFFF" opacity="0.15"/>
    <path d="M -10 -4 Q 55 -22 120 4" fill="none" stroke="url(#ring)" stroke-width="3.5"
          transform="rotate(-22 55 0)" stroke-linecap="round"/>
    <circle cx="115" cy="-2" r="3" fill="#0066FF" transform="rotate(-22 55 0)"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="155" y="78" font-size="40" font-weight="700" fill="#0A0A0A">The AI</text>
    <text x="155" y="120" font-size="44" font-weight="800" fill="#0066FF" letter-spacing="-1">Planit</text>
